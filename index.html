            function supportsLanguageV2(langCode) {
                return Object.prototype.hasOwnProperty.call(localizedTextV2, langCode);
            }

            function setLanguageSelectV2(langCode) {
                const langSelect = document.getElementById('locales');
                if (langSelect && langSelect.querySelector('option[value="' + langCode + '"]')) {
                    langSelect.value = langCode;
                }
            }

            function setLanguageUrlV2(langCode) {
                const url = new URL(window.location.href);
                url.searchParams.set('lang', langCode);
                window.history.replaceState({}, '', url.toString());
            }

            window.updateTextContentForLanguage = function(langCode) {
                const text = localizedTextV2[langCode] || localizedTextV2.en;
                const targets = [
                    document.querySelector('#open-game-button span'),
                    document.querySelector('.styles_download-links-heading__XV9JX'),
                    document.querySelector('.lead-wrapper p'),
                    document.querySelector('#footer-parens'),
                    document.querySelector('#footer-tos'),
                    document.querySelector('#footer-privacy-policy')
                ];

                targets.forEach(function(target, index) {
                    if (target) {
                        target.textContent = text[index];
                    }
                });

                document.documentElement.lang = langCode === 'jp' ? 'ja' : langCode;
                document.documentElement.dir = langCode === 'ar' ? 'rtl' : 'ltr';
            };

            function detectVisitorLanguageV2() {
                const controller = new AbortController();
                const timeoutId = window.setTimeout(function() {
                    controller.abort();
                }, 2500);

                return fetch('https://ipinfo.io/json', {
                    cache: 'no-store',
                    signal: controller.signal
                })
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('IP language detection failed');
                        }
                        return response.json();
                    })
                    .then(function(data) {
                        const country = String(data.country || '').toUpperCase();
                        return geoLanguageMapV2[country] || 'en';
                    })
                    .catch(function() {
                        return 'en';
                    })
                    .finally(function() {
                        window.clearTimeout(timeoutId);
                    });
            }

            window.addEventListener('load', function() {
                const requestedLang = new URLSearchParams(window.location.search).get('lang');
                const initialLang = supportsLanguageV2(requestedLang) ? requestedLang : 'en';

                updateTextContentForLanguage(initialLang);
                setLanguageSelectV2(initialLang);

                const langSelect = document.getElementById('locales');
                if (langSelect) {
                    langSelect.addEventListener('change', function() {
                        if (supportsLanguageV2(this.value)) {
                            updateTextContentForLanguage(this.value);
                            setLanguageUrlV2(this.value);
                        }
